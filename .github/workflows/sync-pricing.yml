name: Sync pricing from Google Sheet

# Pulls the Google Sheet (as CSV), regenerates the app's pricing, and commits to main —
# which triggers the Pages deploy. Runs daily and can be run on demand from the Actions
# tab ("Run workflow"). The sheet URL is baked in below; a repo variable named
# PRICING_SHEET_CSV_URL overrides it if the sheet ever moves. The sheet must be shared
# "anyone with the link can view".
on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *" # daily at 14:00 UTC (~7am Pacific)

permissions:
  contents: write

concurrency:
  group: sync-pricing
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch the Google Sheet as CSV
        env:
          URL: ${{ vars.PRICING_SHEET_CSV_URL || 'https://docs.google.com/spreadsheets/d/1K0GMvQBXWV9mu1K-4JgyEAKYRcjFSSk_0GRpnjXpEuw/export?format=csv' }}
        run: |
          curl -fsSL "$URL" -o pricing/prices.csv
          # sanity-check the download actually looks like our CSV (not an error/login page)
          if ! head -1 pricing/prices.csv | grep -qi 'key' || ! head -1 pricing/prices.csv | grep -qi 'price'; then
            echo "::error::Downloaded file is not the expected pricing CSV (missing key/price header)."
            echo "First line was: $(head -1 pricing/prices.csv)"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate pricing into the app
        run: node scripts/build-pricing.mjs

      - name: Commit if anything changed
        run: |
          git config user.name "pricing-sync[bot]"
          git config user.email "pricing-sync@users.noreply.github.com"
          git add pricing/prices.csv pricing/pricing.json index.html
          if git diff --cached --quiet; then
            echo "No pricing changes."
          else
            git commit -m "Sync pricing from Google Sheet"
            git push
            echo "Pushed updated pricing."
          fi
